<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Site - The Stage & Hover Fixes</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="stage">
        <div class="wall-left"></div>

        <div class="cupboard-area">
            <div class="shelf-scene">
                <div class="shelf-cube">
                    <div class="shelf-face back"></div>
                    <div class="shelf-face top"></div>
                    <div class="shelf-face bottom"></div>
                    <div class="shelf-face left"></div>
                    <div class="shelf-face right"></div>

                    <div class="shoebox box-1">
                        <div class="box-face front"></div><div class="box-face back"></div>
                        <div class="box-face right"></div><div class="box-face left"></div><div class="box-face bottom"></div>
                        <div class="box-face lid-top"></div><div class="box-face lid-front"></div>
                        <div class="box-face lid-back"></div><div class="box-face lid-right"></div><div class="box-face lid-left"></div>
                    </div>

                    <div class="shoebox box-2">
                        <div class="box-face front"></div><div class="box-face back"></div>
                        <div class="box-face right"></div><div class="box-face left"></div><div class="box-face bottom"></div>
                        <div class="box-face lid-top"></div><div class="box-face lid-front"></div>
                        <div class="box-face lid-back"></div><div class="box-face lid-right"></div><div class="box-face lid-left"></div>
                    </div>

                    <div class="shoebox box-3">
                        <div class="box-face front"></div><div class="box-face back"></div>
                        <div class="box-face right"></div><div class="box-face left"></div><div class="box-face bottom"></div>
                        <div class="box-face lid-top"></div><div class="box-face lid-front"></div>
                        <div class="box-face lid-back"></div><div class="box-face lid-right"></div><div class="box-face lid-left"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="cupboard-right"></div>
    </div>

</body>
</html>
