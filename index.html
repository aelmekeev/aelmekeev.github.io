<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Site - The Stage & Shadow Fix</title>
    <style>
        /* =========================================
           CENTRAL CONFIGURATION (CSS VARIABLES)
           ========================================= */
        :root {
            /* Stage Dimensions */
            --shelf-depth: 500px; 
            --frame-width: 15px;  

            /* =========================================
               BOX 1 CONFIGURATION (12.5 x 23 x 36)
               ========================================= */
            --box1-width: 540px;   
            --box1-height: 187.5px;
            --box1-depth: 345px;   
            
            --box1-color-main: #a8c1d9; 
            --box1-color-dark: #95aecd; 
            --box1-color-light: #bccfe3; 
            
            --box1-pos-bottom: 0px; 
            --box1-pos-left: 15%;      
            --box1-pos-z: -350px;
            --box1-rot-y: 0deg;
            
            --box1-pos-left-mobile: 50%;
            --box1-pos-z-mobile: -400px;
            --box1-rot-y-mobile: 90deg;

            /* Broad shadow for the floor */
            --box1-shadow: 0 0 40px rgba(0,0,0,0.5); 

            /* =========================================
               BOX 2 CONFIGURATION (11 x 20.5 x 33)
               ========================================= */
            --box2-width: 495px;   
            --box2-height: 165px;  
            --box2-depth: 307.5px; 
            
            --box2-color-main: #e6b8a2; 
            --box2-color-dark: #d4a38d;
            --box2-color-light: #f5c9b5;
            
            --box2-pos-bottom: calc(var(--box1-height) + var(--lid-gap)); 
            --box2-pos-left: 19%; 
            --box2-pos-z: -350px; 
            --box2-rot-y: 3deg; 
            
            --box2-pos-left-mobile: 49%;
            --box2-pos-z-mobile: -390px;
            --box2-rot-y-mobile: 93deg;

            /* TIGHT contact shadow to prevent the "flying" illusion on overhangs */
            --box2-shadow: 0 0 10px rgba(0,0,0,0.4); 

            /* =========================================
               SHARED BOX SETTINGS
               ========================================= */
            --lid-overhang: 6px;  
            --lid-lip: 35px;      
            --lid-gap: 2px;       
            --shelf-margin: 100px; 
            --shelf-min-width: calc(var(--box1-width) + var(--shelf-margin));

            /* 1-Point Perspective (Vanishing Point) */
            --vp-x: 120%; 
            --vp-y: 30%;
            --vp-x-mobile: 120%;
            --vp-y-mobile: 30%;

            /* Colors - Structural */
            --color-wall: #f7f5f0;              
            --color-frame: #cbb89d;             
            --color-cupboard-inside: #a38d72;   
            --color-cupboard-border: #8e7b63;   
            --color-shelf-base: #e3d3bd;        
            --color-shelf-border: #c8b498;      
            --color-shelf-back: #d6c4aa;        
            --color-shelf-right: #cfbc9f;       
            --color-shelf-top: #d1bda2;         
            --color-shelf-bottom: #e8d9c5;      
        }

        /* CSS Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            background-color: var(--color-wall); 
        }

        /* * The Stage Layout */
        .stage {
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            width: 100%;
            height: 100%;
        }

        .wall-left {
            background-color: var(--color-wall);
            border-right: var(--frame-width) solid var(--color-frame);
        }

        .cupboard-area {
            display: flex;
            height: 100%;
            border-top: var(--frame-width) solid var(--color-frame);
            border-bottom: var(--frame-width) solid var(--color-frame);
        }

        /* * The 3D Shelf Container */
        .shelf-scene {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            min-width: var(--shelf-min-width); 
            perspective: 1200px;
            perspective-origin: var(--vp-x) var(--vp-y); 
            overflow: hidden; 
        }

        .shelf-cube {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .shelf-face {
            position: absolute;
            background-color: var(--color-shelf-base);
            border: 1px solid var(--color-shelf-border);
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.05);
            backface-visibility: hidden; 
        }

        .shelf-face.back { width: 100%; height: 100%; transform: translateZ(calc(-1 * var(--shelf-depth))); background-color: var(--color-shelf-back); }
        .shelf-face.left { width: var(--shelf-depth); height: 100%; transform-origin: left center; transform: rotateY(90deg); }
        .shelf-face.right { width: var(--shelf-depth); height: 100%; right: 0; transform-origin: right center; transform: rotateY(-90deg); background-color: var(--color-shelf-right); }
        .shelf-face.top { width: 100%; height: var(--shelf-depth); transform-origin: top center; transform: rotateX(-90deg); background-color: var(--color-shelf-top); }
        .shelf-face.bottom { width: 100%; height: var(--shelf-depth); bottom: 0; transform-origin: bottom center; transform: rotateX(90deg); background-color: var(--color-shelf-bottom); }

        .cupboard-right {
            background-color: var(--color-cupboard-inside);
            border-left: 5px solid var(--color-cupboard-border);
        }

        /* =========================================
           DYNAMIC SHOEBOX BLUEPRINT
           ========================================= */
        .shoebox {
            position: absolute;
            bottom: var(--b-pos-bottom); 
            left: var(--b-pos-left); 
            width: var(--b-width);
            height: var(--b-height);
            transform-style: preserve-3d;
            transform: translateZ(var(--b-pos-z)) rotateY(var(--b-rot-y)); 
            transition: transform 0.4s ease-out;
            cursor: pointer;
        }

        .box-1 {
            --b-width: var(--box1-width);
            --b-height: var(--box1-height);
            --b-depth: var(--box1-depth);
            --b-color-main: var(--box1-color-main);
            --b-color-dark: var(--box1-color-dark);
            --b-color-light: var(--box1-color-light);
            --b-pos-bottom: var(--box1-pos-bottom);
            --b-pos-left: var(--box1-pos-left);
            --b-pos-z: var(--box1-pos-z);
            --b-rot-y: var(--box1-rot-y);
            --b-shadow: var(--box1-shadow); /* Apply Base Shadow */
        }

        .box-2 {
            --b-width: var(--box2-width);
            --b-height: var(--box2-height);
            --b-depth: var(--box2-depth);
            --b-color-main: var(--box2-color-main);
            --b-color-dark: var(--box2-color-dark);
            --b-color-light: var(--box2-color-light);
            --b-pos-bottom: var(--box2-pos-bottom);
            --b-pos-left: var(--box2-pos-left);
            --b-pos-z: var(--box2-pos-z);
            --b-rot-y: var(--box2-rot-y);
            --b-shadow: var(--box2-shadow); /* Apply Tight Contact Shadow */
        }

        .box-face {
            position: absolute;
            border: 1px solid rgba(0,0,0,0.05); 
        }

        /* MAIN BOX BODY */
        .box-face.front {
            width: var(--b-width); height: var(--b-height);
            background-color: var(--b-color-main);
            transform: translateZ(calc(var(--b-depth) / 2));
            box-shadow: inset 0 40px 20px -10px rgba(0,0,0,0.25);
        }
        .box-face.back {
            width: var(--b-width); height: var(--b-height);
            background-color: var(--b-color-dark);
            transform: rotateY(180deg) translateZ(calc(var(--b-depth) / 2));
        }
        .box-face.right {
            width: var(--b-depth); height: var(--b-height);
            background-color: var(--b-color-dark);
            left: calc((var(--b-width) - var(--b-depth)) / 2);
            transform: rotateY(90deg) translateZ(calc(var(--b-width) / 2));
            box-shadow: inset 0 40px 20px -10px rgba(0,0,0,0.3);
        }
        .box-face.left {
            width: var(--b-depth); height: var(--b-height);
            background-color: var(--b-color-dark);
            left: calc((var(--b-width) - var(--b-depth)) / 2);
            transform: rotateY(-90deg) translateZ(calc(var(--b-width) / 2));
            box-shadow: inset 0 40px 20px -10px rgba(0,0,0,0.3);
        }
        .box-face.bottom {
            width: var(--b-width); height: var(--b-depth);
            background-color: var(--b-color-dark);
            top: calc((var(--b-height) - var(--b-depth)) / 2);
            transform: rotateX(-90deg) translateZ(calc(var(--b-height) / 2));
            /* Dynamically map the configured shadow here */
            box-shadow: var(--b-shadow); 
        }

        /* THE FLAP LID */
        .box-face.lid-top {
            width: calc(var(--b-width) + var(--lid-overhang) * 2);
            height: calc(var(--b-depth) + var(--lid-overhang) * 2);
            background-color: var(--b-color-light);
            left: calc(-1 * var(--lid-overhang));
            top: calc((var(--b-height) - var(--b-depth)) / 2 - var(--lid-overhang));
            transform: rotateX(90deg) translateZ(calc(var(--b-height) / 2 + var(--lid-gap)));
        }
        .box-face.lid-front {
            width: calc(var(--b-width) + var(--lid-overhang) * 2); height: var(--lid-lip);
            background-color: var(--b-color-main);
            left: calc(-1 * var(--lid-overhang)); top: calc(-1 * var(--lid-gap));
            transform: translateZ(calc(var(--b-depth) / 2 + var(--lid-overhang)));
        }
        .box-face.lid-back {
            width: calc(var(--b-width) + var(--lid-overhang) * 2); height: var(--lid-lip);
            background-color: var(--b-color-dark);
            left: calc(-1 * var(--lid-overhang)); top: calc(-1 * var(--lid-gap));
            transform: rotateY(180deg) translateZ(calc(var(--b-depth) / 2 + var(--lid-overhang)));
        }
        .box-face.lid-right {
            width: calc(var(--b-depth) + var(--lid-overhang) * 2); height: var(--lid-lip);
            background-color: var(--b-color-dark);
            left: calc((var(--b-width) - var(--b-depth)) / 2 - var(--lid-overhang)); top: calc(-1 * var(--lid-gap));
            transform: rotateY(90deg) translateZ(calc(var(--b-width) / 2 + var(--lid-overhang)));
        }
        .box-face.lid-left {
            width: calc(var(--b-depth) + var(--lid-overhang) * 2); height: var(--lid-lip);
            background-color: var(--b-color-dark);
            left: calc((var(--b-width) - var(--b-depth)) / 2 - var(--lid-overhang)); top: calc(-1 * var(--lid-gap));
            transform: rotateY(-90deg) translateZ(calc(var(--b-width) / 2 + var(--lid-overhang)));
        }

        /* * Mobile Transformation */
        @media (max-width: 768px) {
            .stage { grid-template-columns: 100%; }
            .wall-left, .cupboard-right { display: none; }
            .cupboard-area { border: none; }
            .shelf-scene { perspective-origin: var(--vp-x-mobile) var(--vp-y-mobile); min-width: 100vw; }
            
            .box-1 {
                --b-pos-left: var(--box1-pos-left-mobile);
                --b-pos-z: var(--box1-pos-z-mobile);
                --b-rot-y: var(--box1-rot-y-mobile);
                transform: translateX(-50%) translateZ(var(--b-pos-z)) rotateY(var(--b-rot-y));
            }
            
            .box-2 {
                --b-pos-left: var(--box2-pos-left-mobile);
                --b-pos-z: var(--box2-pos-z-mobile);
                --b-rot-y: var(--box2-rot-y-mobile);
                transform: translateX(-50%) translateZ(var(--b-pos-z)) rotateY(var(--b-rot-y));
            }

            .box-face.left { background-color: var(--b-color-main); box-shadow: inset 0 40px 20px -10px rgba(0,0,0,0.25); }
            .box-face.front { background-color: var(--b-color-dark); box-shadow: inset 0 40px 20px -10px rgba(0,0,0,0.3); }
            .box-face.lid-left { background-color: var(--b-color-main); }
            .box-face.lid-front { background-color: var(--b-color-dark); }
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="wall-left"></div>

        <div class="cupboard-area">
            <div class="shelf-scene">
                <div class="shelf-cube">
                    <div class="shelf-face back"></div>
                    <div class="shelf-face top"></div>
                    <div class="shelf-face bottom"></div>
                    <div class="shelf-face left"></div>
                    <div class="shelf-face right"></div>

                    <div class="shoebox box-1">
                        <div class="box-face front"></div>
                        <div class="box-face back"></div>
                        <div class="box-face right"></div>
                        <div class="box-face left"></div>
                        <div class="box-face bottom"></div>
                        <div class="box-face lid-top"></div>
                        <div class="box-face lid-front"></div>
                        <div class="box-face lid-back"></div>
                        <div class="box-face lid-right"></div>
                        <div class="box-face lid-left"></div>
                    </div>

                    <div class="shoebox box-2">
                        <div class="box-face front"></div>
                        <div class="box-face back"></div>
                        <div class="box-face right"></div>
                        <div class="box-face left"></div>
                        <div class="box-face bottom"></div>
                        <div class="box-face lid-top"></div>
                        <div class="box-face lid-front"></div>
                        <div class="box-face lid-back"></div>
                        <div class="box-face lid-right"></div>
                        <div class="box-face lid-left"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="cupboard-right"></div>
    </div>

</body>
</html>
