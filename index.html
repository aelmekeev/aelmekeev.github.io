<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Site - The Stage & Flap Lid Box</title>
    <style>
        /* =========================================
           CENTRAL CONFIGURATION (CSS VARIABLES)
           ========================================= */
        :root {
            /* Stage Dimensions */
            --shelf-depth: 600px; 
            --frame-width: 15px;  

            /* Box 1 Dimensions (12.5 x 23 x 36 scaled by 15) */
            --box-width: 540px;   
            --box-height: 187.5px;
            --box-depth: 345px;   

            /* Lid Dimensions (The realistic "Flap") */
            --lid-overhang: 6px;  /* How much the lid sticks out beyond the box */
            --lid-lip: 35px;      /* How far the flap hangs down */
            --lid-gap: 2px;       /* Slight vertical lift to prevent 3D clipping */

            /* Box Placement */
            --box-pos-left: 10%;      /* Horizontal position on the shelf */
            --box-pos-z: -300px;      /* Depth push into the shelf */
            --box-pos-left-mobile: 50%;
            --box-pos-z-mobile: -400px;

            /* Shelf Minimum Width constraints */
            --shelf-margin: 100px; 
            --shelf-min-width: calc(var(--box-width) + var(--shelf-margin));

            /* 1-Point Perspective (Vanishing Point) */
            --vp-x: 120%; 
            --vp-y: 30%;
            --vp-x-mobile: 120%;
            --vp-y-mobile: 30%;

            /* Colors - Backgrounds & Structural */
            --color-wall: #f7f5f0;              
            --color-frame: #cbb89d;             
            --color-cupboard-inside: #a38d72;   
            --color-cupboard-border: #8e7b63;   

            /* Colors - 3D Shelf Faces */
            --color-shelf-base: #e3d3bd;        
            --color-shelf-border: #c8b498;      
            --color-shelf-back: #d6c4aa;        
            --color-shelf-right: #cfbc9f;       
            --color-shelf-top: #d1bda2;         
            --color-shelf-bottom: #e8d9c5;      

            /* Colors - Box 1 (Pastel Blue) */
            --color-box-main: #a8c1d9;
            --color-box-dark: #95aecd; 
            --color-box-light: #bccfe3; 
        }

        /* CSS Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            background-color: var(--color-wall); 
        }

        /* * The Stage Layout */
        .stage {
            display: grid;
            grid-template-columns: 1fr 3fr 1fr;
            width: 100%;
            height: 100%;
        }

        .wall-left {
            background-color: var(--color-wall);
            border-right: var(--frame-width) solid var(--color-frame);
        }

        .cupboard-area {
            display: flex;
            height: 100%;
            border-top: var(--frame-width) solid var(--color-frame);
            border-bottom: var(--frame-width) solid var(--color-frame);
        }

        /* * The 3D Shelf Container */
        .shelf-scene {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            min-width: var(--shelf-min-width); 
            perspective: 1200px;
            perspective-origin: var(--vp-x) var(--vp-y); 
            overflow: hidden; 
        }

        .shelf-cube {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .shelf-face {
            position: absolute;
            background-color: var(--color-shelf-base);
            border: 1px solid var(--color-shelf-border);
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.05);
            /* FIX FOR DESKTOP LEAK: Hides the exterior side of the walls */
            backface-visibility: hidden; 
        }

        .shelf-face.back {
            width: 100%;
            height: 100%;
            transform: translateZ(calc(-1 * var(--shelf-depth)));
            background-color: var(--color-shelf-back);
        }

        .shelf-face.left {
            width: var(--shelf-depth);
            height: 100%;
            transform-origin: left center;
            transform: rotateY(90deg);
        }

        .shelf-face.right {
            width: var(--shelf-depth);
            height: 100%;
            right: 0;
            transform-origin: right center;
            transform: rotateY(-90deg);
            background-color: var(--color-shelf-right);
        }

        .shelf-face.top {
            width: 100%;
            height: var(--shelf-depth);
            transform-origin: top center;
            transform: rotateX(-90deg);
            background-color: var(--color-shelf-top);
        }

        .shelf-face.bottom {
            width: 100%;
            height: var(--shelf-depth);
            bottom: 0;
            transform-origin: bottom center;
            transform: rotateX(90deg);
            background-color: var(--color-shelf-bottom);
        }

        .cupboard-right {
            background-color: var(--color-cupboard-inside);
            border-left: 5px solid var(--color-cupboard-border);
        }

        /* =========================================
           THE SHOEBOX (Project)
           ========================================= */
        .shoebox {
            position: absolute;
            bottom: 0; 
            left: var(--box-pos-left); 
            width: var(--box-width);
            height: var(--box-height);
            transform-style: preserve-3d;
            transform: translateZ(var(--box-pos-z)); 
            transition: transform 0.4s ease-out;
            cursor: pointer;
        }

        .box-face {
            position: absolute;
            border: 1px solid rgba(0,0,0,0.05); 
        }

        /* MAIN BOX BODY */
        .box-face.front {
            width: var(--box-width);
            height: var(--box-height);
            background-color: var(--color-box-main);
            transform: translateZ(calc(var(--box-depth) / 2));
            /* Shadow cast by the lid flap */
            box-shadow: inset 0 40px 20px -10px rgba(0,0,0,0.25);
        }

        .box-face.back {
            width: var(--box-width);
            height: var(--box-height);
            background-color: var(--color-box-dark);
            transform: rotateY(180deg) translateZ(calc(var(--box-depth) / 2));
        }

        .box-face.right {
            width: var(--box-depth);
            height: var(--box-height);
            background-color: var(--color-box-dark);
            left: calc((var(--box-width) - var(--box-depth)) / 2);
            transform: rotateY(90deg) translateZ(calc(var(--box-width) / 2));
            box-shadow: inset 0 40px 20px -10px rgba(0,0,0,0.3);
        }

        .box-face.left {
            width: var(--box-depth);
            height: var(--box-height);
            background-color: var(--color-box-dark);
            left: calc((var(--box-width) - var(--box-depth)) / 2);
            transform: rotateY(-90deg) translateZ(calc(var(--box-width) / 2));
            box-shadow: inset 0 40px 20px -10px rgba(0,0,0,0.3);
        }

        .box-face.bottom {
            width: var(--box-width);
            height: var(--box-depth);
            background-color: var(--color-box-dark);
            top: calc((var(--box-height) - var(--box-depth)) / 2);
            transform: rotateX(-90deg) translateZ(calc(var(--box-height) / 2));
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        /* THE FLAP LID */
        .box-face.lid-top {
            width: calc(var(--box-width) + var(--lid-overhang) * 2);
            height: calc(var(--box-depth) + var(--lid-overhang) * 2);
            background-color: var(--color-box-light);
            left: calc(-1 * var(--lid-overhang));
            top: calc((var(--box-height) - var(--box-depth)) / 2 - var(--lid-overhang));
            transform: rotateX(90deg) translateZ(calc(var(--box-height) / 2 + var(--lid-gap)));
        }

        .box-face.lid-front {
            width: calc(var(--box-width) + var(--lid-overhang) * 2);
            height: var(--lid-lip);
            background-color: var(--color-box-main);
            left: calc(-1 * var(--lid-overhang));
            top: calc(-1 * var(--lid-gap));
            transform: translateZ(calc(var(--box-depth) / 2 + var(--lid-overhang)));
        }

        /* FIX FOR MISSING LID GAP: Added the back flap */
        .box-face.lid-back {
            width: calc(var(--box-width) + var(--lid-overhang) * 2);
            height: var(--lid-lip);
            background-color: var(--color-box-dark);
            left: calc(-1 * var(--lid-overhang));
            top: calc(-1 * var(--lid-gap));
            transform: rotateY(180deg) translateZ(calc(var(--box-depth) / 2 + var(--lid-overhang)));
        }

        .box-face.lid-right {
            width: calc(var(--box-depth) + var(--lid-overhang) * 2);
            height: var(--lid-lip);
            background-color: var(--color-box-dark);
            left: calc((var(--box-width) - var(--box-depth)) / 2 - var(--lid-overhang));
            top: calc(-1 * var(--lid-gap));
            transform: rotateY(90deg) translateZ(calc(var(--box-width) / 2 + var(--lid-overhang)));
        }

        .box-face.lid-left {
            width: calc(var(--box-depth) + var(--lid-overhang) * 2);
            height: var(--lid-lip);
            background-color: var(--color-box-dark);
            left: calc((var(--box-width) - var(--box-depth)) / 2 - var(--lid-overhang));
            top: calc(-1 * var(--lid-gap));
            transform: rotateY(-90deg) translateZ(calc(var(--box-width) / 2 + var(--lid-overhang)));
        }

        /* * Mobile Transformation */
        @media (max-width: 768px) {
            .stage {
                grid-template-columns: 100%;
            }
            .wall-left, .cupboard-right {
                display: none;
            }
            .cupboard-area {
                border: none; 
            }
            .shelf-scene {
                perspective-origin: var(--vp-x-mobile) var(--vp-y-mobile); 
                min-width: 100vw; 
            }
            .shoebox {
                left: var(--box-pos-left-mobile);
                /* FIX FOR WRONG SIDE FACING FRONT: Changed rotateY to positive 90deg */
                transform: translateX(-50%) translateZ(var(--box-pos-z-mobile)) rotateY(90deg);
            }
            
            /* DYNAMIC LIGHTING FIX: Now that the Left face is actually in front, this correctly brightens it */
            .box-face.left {
                background-color: var(--color-box-main);
                box-shadow: inset 0 40px 20px -10px rgba(0,0,0,0.25);
            }
            .box-face.front {
                background-color: var(--color-box-dark);
                box-shadow: inset 0 40px 20px -10px rgba(0,0,0,0.3);
            }
            .box-face.lid-left {
                background-color: var(--color-box-main);
            }
            .box-face.lid-front {
                background-color: var(--color-box-dark);
            }
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="wall-left"></div>

        <div class="cupboard-area">
            <div class="shelf-scene">
                <div class="shelf-cube">
                    <div class="shelf-face back"></div>
                    <div class="shelf-face top"></div>
                    <div class="shelf-face bottom"></div>
                    <div class="shelf-face left"></div>
                    <div class="shelf-face right"></div>

                    <div class="shoebox">
                        <div class="box-face front"></div>
                        <div class="box-face back"></div>
                        <div class="box-face right"></div>
                        <div class="box-face left"></div>
                        <div class="box-face bottom"></div>

                        <div class="box-face lid-top"></div>
                        <div class="box-face lid-front"></div>
                        <div class="box-face lid-back"></div>
                        <div class="box-face lid-right"></div>
                        <div class="box-face lid-left"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="cupboard-right"></div>
    </div>

</body>
</html>
